# =============================================================================
# AfricAnalyzer — Repo2 Intelligence Analyzer — Production Stack
# =============================================================================
# Hardened environment for EC2 deployments. No code volumes (baked-in image).
# Usage: docker compose -f docker/docker-compose-prod.yml up -d
# =============================================================================

name: intelligence-analyzer-prod

services:
  # ── PostgreSQL (Hardened) ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: siem-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - siem-internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres -c shared_buffers=128MB -c effective_cache_size=384MB 
               -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 
               -c wal_buffers=8MB -c work_mem=4MB -c max_connections=50 
               -c min_wal_size=256MB -c max_wal_size=1GB
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Intelligence Analyzer API ──────────────────────────────────────────────
  analyzer:
    image: ${DOCKER_ORG:-africanalyzer}/${APP_NAME:-intelligence_analyzer}:${IMAGE_TAG:-latest}
    container_name: siem-analyzer-prod
    restart: unless-stopped
    user: "1000:1000"
    labels:
      com.afric.version: "${IMAGE_TAG:-latest}"
    ports:
      - "127.0.0.1:8000:8000" # Bridged via Cloudflare Tunnel internally
      - "127.0.0.1:9091:9091" # Metrics
    env_file:
      - ./config/.env.production
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./config:/app/config:ro # Secure read-only config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siem-internal
      - afric-shared
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Consumer Worker ────────────────────────────────────────────────────────
  consumer:
    image: ${DOCKER_ORG:-africanalyzer}/${APP_NAME:-intelligence_analyzer}:${IMAGE_TAG:-latest}
    container_name: siem-consumer-prod
    restart: unless-stopped
    user: "1000:1000"
    command: [ "python", "-m", "src.services.redis_consumer" ]
    env_file:
      - ./config/.env.production
    volumes:
      - ./logs/consumer:/app/logs
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    networks:
      - siem-internal
      - afric-shared
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 1m
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import redis, os; r=redis.Redis.from_url(os.environ['REDIS_URL']); r.ping()\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  siem-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24 # Isolated from Repo 1
  afric-shared:
    external: true
    name: afric-shared-network # Inter-repo communication

volumes:
  pg_prod_data:
    driver: local
